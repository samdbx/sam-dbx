name: Deploy Notebook(s) to Databricks

on:
  workflow_dispatch:
    inputs:
      notebooks:
        description: 'Comma-separated notebook filenames (relative to workflows/myproject/)'
        required: true
        default: 'my_notebook.py'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Databricks CLI
        run: pip install databricks-cli

      - name: Configure Databricks CLI
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host = $DATABRICKS_HOST
          token = $DATABRICKS_TOKEN
          EOF

      - name: Deploy selected notebooks
        run: |
          IFS=',' read -ra NOTEBOOKS <<< "${{ github.event.inputs.notebooks }}"
          for nb in "${NOTEBOOKS[@]}"; do
            nb_trimmed=$(echo "$nb" | xargs)
            echo "Deploying: $nb_trimmed"

            ext="${nb_trimmed##*.}"
            case "$ext" in
              py) lang="PYTHON" ;;
              sql) lang="SQL" ;;
              scala) lang="SCALA" ;;
              r|R) lang="R" ;;
              *) lang="PYTHON" ;;
            esac

            databricks workspace import \
              "workflows/myproject/$nb_trimmed" \
              "/Workspace/myproject_DEV/$nb_trimmed" \
              --language "$lang" \
              --format SOURCE \
              --overwrite
          done
